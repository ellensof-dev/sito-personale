<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elena Sofia Olivieri</title>
<link rel="icon" type="image/png" href="avatar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #ffffff;
      color: #111111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      max-width: 560px;
      width: 100%;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #111111;
      margin-bottom: 1.6rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background-color: #111111;
      margin-bottom: 1.6rem;
    }

    .bio {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.75;
      color: #555555;
      margin-bottom: 2.4rem;
    }

    .status {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaaaaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Elena Sofia Olivieri</h1>
    <div class="divider"></div>
    <p class="bio">
      Product designer and creative thinker.<br />
      This site is a work in progress — more coming soon.
    </p>
  </div>
</body>
</html>
